openapi: 3.0.3
info:
  title: Stellabill Backend API
  description: |
    Stellabill backend HTTP API.

    This specification covers all implemented `/api/*` routes.

    Notes:
      - Preflight CORS requests (`OPTIONS`) are handled by middleware and return `204`.
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Plans
  - name: Subscriptions
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/plans:
    get:
      tags: [Plans]
      summary: List billing plans
      operationId: listPlans
      responses:
        "200":
          description: Plans list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlansResponse"
  /api/subscriptions:
    get:
      tags: [Subscriptions]
      summary: List subscriptions
      operationId: listSubscriptions
      responses:
        "200":
          description: Subscriptions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsResponse"
  /api/subscriptions/{id}:
    get:
      tags: [Subscriptions]
      summary: Get one subscription
      operationId: getSubscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Subscription identifier
      responses:
        "200":
          description: Subscription detail with embedded plan metadata and billing summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "400":
          description: Bad request — malformed subscription ID or unsupported query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized — missing or invalid authentication credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden — caller does not own the requested subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found — subscription ID does not exist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "410":
          description: Gone — subscription has been soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal server error — e.g. unparseable billing amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: stellarbill-backend
    Plan:
      type: object
      additionalProperties: false
      required: [id, name, amount, currency, interval]
      properties:
        id:
          type: string
          example: plan_basic
        name:
          type: string
          example: Basic
        amount:
          type: string
          description: Amount as string (placeholder until DB integration).
          example: "1000"
        currency:
          type: string
          example: NGN
        interval:
          type: string
          example: monthly
        description:
          type: string
          example: Starter plan
    PlansResponse:
      type: object
      additionalProperties: false
      required: [plans]
      properties:
        plans:
          type: array
          items:
            $ref: "#/components/schemas/Plan"
    Subscription:
      type: object
      additionalProperties: false
      required: [id, plan_id, customer, status, amount, interval]
      properties:
        id:
          type: string
          example: sub_123
        plan_id:
          type: string
          example: plan_basic
        customer:
          type: string
          example: customer_123
        status:
          type: string
          example: active
        amount:
          type: string
          example: "1000"
        interval:
          type: string
          example: monthly
        next_billing:
          type: string
          description: Next billing datetime (string placeholder).
          example: "2026-04-01T00:00:00Z"
    SubscriptionsResponse:
      type: object
      additionalProperties: false
      required: [subscriptions]
      properties:
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
    ResponseEnvelope:
      type: object
      additionalProperties: false
      required: [api_version, data]
      properties:
        api_version:
          type: string
          example: "1"
        data:
          $ref: "#/components/schemas/SubscriptionDetail"
        warnings:
          type: array
          items:
            type: string
          example: ["plan not found"]
    SubscriptionDetail:
      type: object
      additionalProperties: false
      required: [id, plan_id, customer, status, interval, billing_summary]
      properties:
        id:
          type: string
          example: sub_123
        plan_id:
          type: string
          example: plan_basic
        customer:
          type: string
          example: customer_123
        status:
          type: string
          example: active
        interval:
          type: string
          example: monthly
        plan:
          $ref: "#/components/schemas/PlanMetadata"
        billing_summary:
          $ref: "#/components/schemas/BillingSummary"
    PlanMetadata:
      type: object
      additionalProperties: false
      required: [plan_id, name, amount, currency, interval]
      properties:
        plan_id:
          type: string
          example: plan_basic
        name:
          type: string
          example: Pro
        amount:
          type: string
          example: "1999"
        currency:
          type: string
          example: USD
        interval:
          type: string
          example: monthly
        description:
          type: string
          example: The professional tier
    BillingSummary:
      type: object
      additionalProperties: false
      required: [amount_cents, currency, next_billing_date]
      properties:
        amount_cents:
          type: integer
          format: int64
          example: 1999
        currency:
          type: string
          example: USD
        next_billing_date:
          type: string
          nullable: true
          example: "2024-03-01T00:00:00Z"
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [code, message, trace_id]
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: The requested resource was not found
        trace_id:
          type: string
          example: "abc-123"
        details:
          type: object
          nullable: true
          example:
            field: id
