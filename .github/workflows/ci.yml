name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit + contract tests
        run: go test ./...
      - name: OpenAPI validation
        run: go run ./cmd/openapi-validate
      - name: Migration Safety Validation
        run: go run ./cmd/validate-migrations
      - name: Coverage (>= 65% repo-wide; outbox JWE tests required)
        shell: bash
        run: |
          set -euo pipefail
          go test -count=1 -coverprofile=outbox_coverage.out ./internal/outbox/...
          ./scripts/check-coverage.sh outbox_coverage.out 40
          pkgs=$(go list ./... | grep -v '^stellarbill-backend/cmd/')
          coverpkgs=$(echo "$pkgs" | paste -sd, -)
          go test -count=1 -coverpkg="$coverpkgs" -coverprofile=coverage.out $pkgs
          ./scripts/check-coverage.sh coverage.out 65

  benchmark-thresholds:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Run baseline benchmarks
        run: |
          go test ./internal/handlers/... -bench=. -benchmem -benchtime=1s -count=1 | tee baseline.txt
      
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Run current benchmarks
        run: |
          go test ./internal/handlers/... -bench=. -benchmem -benchtime=1s -count=1 | tee current.txt
      
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      
      - name: Compare benchmarks
        run: |
          echo "## Benchmark Comparison" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          benchstat baseline.txt current.txt | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Check for regressions
        run: |
          REGRESSION_PCT=20
          if benchstat baseline.txt current.txt | grep -E "\+[2-9][0-9]\.[0-9]+%|\+[0-9]{3,}" > /dev/null 2>&1; then
            echo "❌ Performance regression detected (>${REGRESSION_PCT}%)"
            benchstat baseline.txt current.txt
            exit 1
          fi
          echo "✅ No significant regressions (<${REGRESSION_PCT}%)"