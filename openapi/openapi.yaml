openapi: 3.0.3
info:
  title: Stellabill Backend API
  description: |
    Stellabill backend HTTP API.

    This specification covers all implemented `/api/*` routes.

    Notes:
      - Preflight CORS requests (`OPTIONS`) are handled by middleware and return `204`.
      - Authentication uses Bearer token (JWT) for versioned endpoints.
      - Health endpoint is public and unversioned.
  version: 0.2.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Plans
  - name: Subscriptions
  - name: Statements
  - name: Admin
securitySchemes:
  bearerAuth:
    type: http
    scheme: bearer
    bearerFormat: JWT
    description: JWT token obtained via authentication
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/plans:
    get:
      tags: [Plans]
      summary: List billing plans
      operationId: listPlansV1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plans list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlansResponse"
  /api/v1/subscriptions:
    get:
      tags: [Subscriptions]
      summary: List subscriptions
      operationId: listSubscriptionsV1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscriptions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsResponse"
  /api/v1/subscriptions/{id}:
    get:
      tags: [Subscriptions]
      summary: Get one subscription
      operationId: getSubscriptionV1
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Subscription identifier
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
  /api/v1/statements:
    get:
      tags: [Statements]
      summary: List statements
      operationId: listStatementsV1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Statements list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementsResponse"
  /api/v1/statements/{id}:
    get:
      tags: [Statements]
      summary: Get one statement
      operationId: getStatementV1
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Statement identifier
      responses:
        "200":
          description: Statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Statement"
  /api/v1/admin/purge:
    post:
      tags: [Admin]
      summary: Purge cache (admin only)
      operationId: purgeCacheV1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cache purged
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Cache purged successfully"
  /api/v1/admin/diagnostics:
    get:
      tags: [Admin]
      summary: Run diagnostics (admin only)
      operationId: runDiagnosticsV1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Diagnostics results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  checks:
                    type: object
  /api/v1/admin/reconcile:
    post:
      tags: [Admin]
      summary: Reconcile subscriptions (admin only)
      operationId: reconcileV1
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subscriptions:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Reconciliation complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "reconciliation complete"
  /api/v1/admin/reports:
    get:
      tags: [Admin]
      summary: List reconciliation reports (admin only)
      operationId: listReportsV1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reports list
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      type: object
components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: stellarbill-backend
    Plan:
      type: object
      additionalProperties: false
      required: [id, name, amount, currency, interval]
      properties:
        id:
          type: string
          example: plan_basic
        name:
          type: string
          example: Basic
        amount:
          type: string
          description: Amount as string (placeholder until DB integration).
          example: "1000"
        currency:
          type: string
          example: NGN
        interval:
          type: string
          example: monthly
        description:
          type: string
          example: Starter plan
    PlansResponse:
      type: object
      additionalProperties: false
      required: [plans]
      properties:
        plans:
          type: array
          items:
            $ref: "#/components/schemas/Plan"
    Subscription:
      type: object
      additionalProperties: false
      required: [id, plan_id, customer, status, amount, interval]
      properties:
        id:
          type: string
          example: sub_123
        plan_id:
          type: string
          example: plan_basic
        customer:
          type: string
          example: customer_123
        status:
          type: string
          example: active
        amount:
          type: string
          example: "1000"
        interval:
          type: string
          example: monthly
        next_billing:
          type: string
          description: Next billing datetime (string placeholder).
          example: "2026-04-01T00:00:00Z"
    SubscriptionsResponse:
      type: object
      additionalProperties: false
      required: [subscriptions]
      properties:
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
    Statement:
      type: object
      additionalProperties: false
      required: [id, subscription_id, amount, currency, status]
      properties:
        id:
          type: string
          example: stmt_123
        subscription_id:
          type: string
          example: sub_123
        amount:
          type: string
          example: "1000"
        currency:
          type: string
          example: NGN
        status:
          type: string
          example: pending
        period_start:
          type: string
          example: "2026-04-01T00:00:00Z"
        period_end:
          type: string
          example: "2026-05-01T00:00:00Z"
    StatementsResponse:
      type: object
      additionalProperties: false
      required: [statements]
      properties:
        statements:
          type: array
          items:
            $ref: "#/components/schemas/Statement"
