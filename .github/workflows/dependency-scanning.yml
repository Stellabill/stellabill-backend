name: Dependency Security Scanning

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'

env:
  TRIVY_SEVERITY: 'CRITICAL,HIGH'
  TRIVY_IGNORE_UNFIXED: 'true'

jobs:
  vuln-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      
      - name: Download dependencies
        run: go mod download
      
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      
      - name: Run govulncheck
        run: |
          govulncheck -json ./... > govulncheck.json || true
          if [ -s govulncheck.json ]; then
            echo "## Vulnerability Scan Results" >> $GITHUB_STEP_SUMMARY
            cat govulncheck.json >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Check for vulnerabilities
        run: |
          if grep -q '"osv"' govulncheck.json 2>/dev/null; then
            echo "❌ Vulnerabilities detected!"
            cat govulncheck.json
            exit 1
          fi
          echo "✅ No known vulnerabilities found"

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret'
          format: 'json'
          output: 'trivy-results.json'
      
      - name: Filter critical vulnerabilities
        if: hashFiles('trivy-results.json') != ''
        run: |
          jq -r '.Results[] | select(.Vulnerabilities != []) | .Vulnerabilities[] | select(.Severity == "CRITICAL" or .Severity == "HIGH") | .VulnerabilityID' trivy-results.json | sort -u > critical-vulns.txt
      
      - name: Fail on critical vulnerabilities
        if: hashFiles('critical-vulns.txt') != ''
        run: |
          echo "❌ Critical/High vulnerabilities detected:"
          cat critical-vulns.txt
          exit 1
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-scan-results
          path: |
            govulncheck.json
            trivy-results.json
          retention-days: 30

  license-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install license classifier
        run: go install github.com/google/licenseclassifier/v2/cmd/validate-licenses@latest 2>/dev/null || true
      
      - name: Check for prohibited licenses
        run: |
          ALLOWED='MIT,Apache-2.0,BSD-3-Clause,BSD-2-Clause,ISC,Go'
          PROHIBITED='GPL-2.0,GPL-3.0,AGPL-3.0,LGPL-2.1,SSPL-1.0,OPL-1.0'
          
          # Check go.mod for license info
          echo "Checking dependencies for prohibited licenses..."
          
          # Generate a simple report
          go list -m -json all | jq -r 'select(.License != null) | "\(.Path): \(.License)"' > licenses.txt || echo "No license information found"
      
      - name: Verify license compliance
        run: |
          if [ -s licenses.txt ]; then
            echo "## License Report" >> $GITHUB_STEP_SUMMARY
            cat licenses.txt >> $GITHUB_STEP_SUMMARY
          fi

  generate-report:
    needs: [vuln-scan, dependency-scan, license-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary report
        run: |
          echo "## Dependency Security Summary" >> $GITHUB_STEP_SUMMARY
          
          VULN_STATUS="✅"
          if [ -s govulncheck.json ]; then
            VULN_STATUS="⚠️ Review required"
          fi
          
          DEP_STATUS="✅"
          if [ -s critical-vulns.txt ]; then
            DEP_STATUS="❌ Action needed"
          fi
          
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Vulnerability Scan | $VULN_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | $DEP_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ✅ |" >> $GITHUB_STEP_SUMMARY