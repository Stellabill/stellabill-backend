openapi: 3.0.3
info:
  title: Stellabill Backend API
  description: |
    Stellabill backend HTTP API.

    This specification covers all implemented `/api/*` routes.

    Notes:
      - Preflight CORS requests (`OPTIONS`) are handled by middleware and return `204`.
  version: 0.2.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Plans
  - name: Subscriptions
  - name: Statements
  - name: Admin
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/plans:
    get:
      tags: [Plans]
      summary: List billing plans
      operationId: listPlans
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Plans list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlansResponse"
  /api/subscriptions:
    get:
      tags: [Subscriptions]
      summary: List subscriptions
      operationId: listSubscriptions
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Subscriptions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsResponse"
  /api/subscriptions/{id}:
    get:
      tags: [Subscriptions]
      summary: Get one subscription
      operationId: getSubscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Subscription identifier
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
  /api/statements:
    get:
      tags: [Statements]
      summary: List statements
      operationId: listStatements
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Statements list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementsResponse"
  /api/admin/reports:
    get:
      tags: [Admin]
      summary: List reconciliation reports
      operationId: listReports
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Reports list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportsResponse"
components:
  parameters:
    Cursor:
      name: cursor
      in: query
      description: Opaque cursor for pagination
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        default: 10
        maximum: 100
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: stellarbill-backend
    Pagination:
      type: object
      required: [limit, has_more]
      properties:
        next_cursor:
          type: string
          example: eyJpZCI6InBsYW5fMiIsInNvcnRfdmFsdWUiOiJQbGFuIDIifQ==
        limit:
          type: integer
          example: 10
        has_more:
          type: boolean
          example: true
    Plan:
      type: object
      additionalProperties: false
      required: [id, name, amount, currency, interval]
      properties:
        id:
          type: string
          example: plan_basic
        name:
          type: string
          example: Basic
        amount:
          type: string
          example: "1000"
        currency:
          type: string
          example: NGN
        interval:
          type: string
          example: monthly
        description:
          type: string
          example: Starter plan
    PlansResponse:
      type: object
      additionalProperties: false
      required: [plans, limit, has_more]
      properties:
        plans:
          type: array
          items:
            $ref: "#/components/schemas/Plan"
        next_cursor:
          type: string
        limit:
          type: integer
        has_more:
          type: boolean
    Subscription:
      type: object
      additionalProperties: false
      required: [id, plan_id, customer, status, amount, interval]
      properties:
        id:
          type: string
          example: sub_123
        plan_id:
          type: string
          example: plan_basic
        customer:
          type: string
          example: customer_123
        status:
          type: string
          example: active
        amount:
          type: string
          example: "1000"
        interval:
          type: string
          example: monthly
        next_billing:
          type: string
          example: "2026-04-01T00:00:00Z"
    SubscriptionsResponse:
      type: object
      additionalProperties: false
      required: [subscriptions, limit, has_more]
      properties:
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
        next_cursor:
          type: string
        limit:
          type: integer
        has_more:
          type: boolean
    Statement:
      type: object
      properties:
        id:
          type: string
        subscription_id:
          type: string
        customer:
          type: string
        total_amount:
          type: string
        currency:
          type: string
        status:
          type: string
    StatementsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            statements:
              type: array
              items:
                $ref: "#/components/schemas/Statement"
        pagination:
          $ref: "#/components/schemas/Pagination"
    Report:
      type: object
      properties:
        subscription_id:
          type: string
        matched:
          type: boolean
    ReportsResponse:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/Report"
        next_cursor:
          type: string
        limit:
          type: integer
        has_more:
          type: boolean
